<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nik Transportes</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f2f2f2;
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        img {
            display: block;
            border: 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
        }

        .padding {
            padding: 30px;
        }

        .hero {
            background: #243f5c;
            color: #ffffff;
            padding: 40px 30px;
        }

        .text {
            padding: 35px 30px;
            font-size: 16px;
            line-height: 1.6;
            color: #444444;
        }

        .cta {
            background: #243f5c;
            text-align: center;
            padding: 40px 30px;
        }

        .botao {
            background: #ff8a00;
            color: #ffffff !important;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            display: inline-block;
        }

        .footer {
            padding: 30px;
        }

        @media only screen and (max-width:600px) {

            .padding {
                padding: 25px 20px;
            }

            .hero {
                padding: 30px 20px;
            }

            .text {
                padding: 30px 20px;
            }

            .cta {
                padding: 35px 20px;
            }

        }
    </style>

</head>

<body>

    <table width="100%" bgcolor="#f2f2f2">
        <tr>
            <td align="center">

                <table class="container">

                    <tr>
                        <td class="hero">

                            <h1 style="margin:0;font-size:30px;font-weight:700;">
                                Nik Transportes entrega em todo o Brasil
                            </h1>

                            <p style="margin-top:20px;font-size:16px;line-height:1.5;">
                                Desde 1999 entregando segurança, pontualidade e acompanhamento dedicado em cada serviço
                            </p>

                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
