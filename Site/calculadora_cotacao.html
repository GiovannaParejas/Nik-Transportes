<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cotação - Nik Transportes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * {
            font-family: "Montserrat", sans-serif;
            box-sizing: border-box;
        }
        
        html, body {
    margin: 0;
    padding: 0;
    width: 100%;
}

.container {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
}

        .container {
            background: #FFFFFF;
            padding: 80px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        
        hr {
            border: none;
            height: 1px;
            background: #DEDEDE;
        }

        h3 {
            font-size: 18px;
            font-weight: 600;
            color: #0b2a44;
            margin-bottom: 15px;
            margin-top: 10px;
        }
        
        .tituloPrincipal {
            margin-top: 0px;
        }

        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            position: relative;
        }

        .grid2::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            background: #DEDEDE;
            transform: translateX(-50%);
            margin: 25px 0;
        }

        .semLinha::before {
            display: none;
        }

        .semLinha>div:last-child {
            border-left: none;
            padding-left: 0;
        }

        .gridLine {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        label {
            font-size: 16px;
            font-weight: 400;
            display: block;
            margin-bottom: 5px;
        }


       input,
select {
    width: 100%;
    padding: 12px 35px 12px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-bottom: 16px;
    font-size: 14px;

    height: 44px;            /* 🔥 garante mesma altura */
    line-height: 20px;       /* 🔥 evita corte */
}

input {
    color: #000; /* 🔥 texto digitado PRETO */
}

/* placeholder continua cinza */
input::placeholder {
    color: #3A3F4573;
}

select {
    color: #3A3F45;
}

/* deixa só o placeholder cinza */
select option[value=""] {
    color: #3A3F4573;
}



select {
    display: flex;
    align-items: center; /* 🔥 centraliza o texto */
}

        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        select {
            background: linear-gradient(45deg, transparent 50%, #000 50%),
                linear-gradient(135deg, #000 50%, transparent 50%);
            background-position: calc(100% - 15px) center,
                calc(100% - 10px) center;
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }

        input[list] {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;

            background-color: #fff;

            background-image: linear-gradient(45deg, transparent 50%, #000 50%),
                linear-gradient(135deg, #000 50%, transparent 50%);
            background-position: calc(100% - 15px) center,
                calc(100% - 10px) center;
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;

            padding-right: 35px;
        }

        input[list]::-webkit-calendar-picker-indicator {
            opacity: 0;
            display: none;
        }

        input::placeholder {
            font-size: 14px;
            font-weight: 400;
        }


        button:not(.addParada) {
            background: #ff7a00;
            color: white;
            border: 2px solid transparent;
            padding: 12px 40px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:not(.addParada):hover {
            background: #fff;
            color: #ff7a00;
            border: 2px solid #ff7a00;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .parada-bloco button {
            display: block;
            margin: 15px auto 0 auto;
            padding: 8px 20px;
            font-size: 14px;
        }

        .resumo {
            display: none;
            margin: 40px auto;
            background: #F8F9FB;
            padding: 60px 40px;
            border-radius: 16px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .resumo h3 {
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            margin-top: 0;
        }

        .resumo p {
            margin: 0;
        }

        .resumo .enderecos {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

 .valorBox {
    margin: 20px auto;
    padding: 25px;
    background: #FFFFFF;
    border-radius: 12px;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

        .infoResumo {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .infoBox {
            flex: 1;
            min-width: 150px;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: #ffffff;
        }

        .infoBox p {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 5px 0;
            color: #1B3653;
        }

        .infoBox span {
            font-weight: 500;
            color: #3A3F45;
        }

        .valorBox .titulo {
            color: #1B3653;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .valorLinha {
            display: flex;
            justify-content: space-between;
        }

        .divisor {
            border-top: 1px solid #DEDEDE;
            margin: 15px 0;
        }

        .total {
            font-weight: 700;
            font-size: 25px;
            color: #3A3F45;
            display: flex;
            justify-content: space-between;
        }

        .whatsapp {
            background: #25D366;
            margin-top: 10px;
        }

        input:invalid {
            border: 1px solid #ff4d4d;
        }

        input:focus,
select:focus {
    outline: none !important;
    border: 1px solid #ff7a00 !important;
    box-shadow: 0 0 0 2px rgba(255, 122, 0, 0.2);
}

        .checkboxRetorno {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .checkboxRetorno input {
            width: 18px;
            height: 18px;
            margin: 0;
            padding: 0;
            flex-shrink: 0;
            accent-color: #ff7a00;
        }

        .checkboxRetorno span {
            font-size: 16px;
            line-height: 1;
        }

        .addParada {
    background: white;
    border: none;
    padding: 15px 0;
    font-size: 16px;
    font-weight: 500;
    color: #3A3F45;
    cursor: pointer;
}

.addParada:hover {
    background: white;
    color: black;
    text-decoration: underline; /* ou remove se não quiser nenhum efeito */
}

        .resumo,
        .infoBox,
        .valorBox {
            box-shadow: 0 10px 30px 6px rgba(0, 0, 0, 0.06);
        }

        .enderecoBox {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px 6px rgba(0, 0, 0, 0.06);
        }

        .enderecoBox p {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #coleta,
        #entrega {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tituloEndereco {
            font-size: 20px;
            font-weight: 600;
            color: #1B3653;
            margin-bottom: 10px;
            padding-bottom: 15px;
        }

        input[type="date"],
        select {
            position: relative;
            padding-right: 35px;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            right: 10px;
            cursor: pointer;
        }
        
        button.addParada,
button.addParada:hover,
button.addParada:focus {
    box-shadow: none !important;
    outline: none;
}
        
     

        /* ============================= */
        /* RESPONSIVO PARA ELEMENTOR */
        /* ============================= */

        /* Desktop grande */
        @media (max-width:1200px) {

            .container {
                max-width: 95%;
                padding: 60px 40px;
            }
            
            

        }

        /* Tablet */
        @media (max-width:1024px) {
            
            html, body {
    margin: 0;
    padding: 0;
    width: 100%;
}

.container {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
}

            .container {
                padding: 40px 25px;
                border-radius: 18px;
            }

            .grid2 {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .grid2::before {
                display: none;
            }

            .gridLine {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .infoResumo {
                flex-direction: column;
                  gap: 10px; /* já está, mas garantimos */
        margin-bottom: 20px; /* antes 40px */
        margin-top: 20px;
            }
            
        .resumo .enderecos {

            gap: 8px;
            margin-bottom: 20px;
        }


            .infoBox {
                width: 100%;
                 padding: 12px; /* antes 15~20px */
            }

            button {
                width: 100%;
            }

            .resumo {
               padding: 25px 15px;
            }
            
             hr {
        display: none;
    }
    
    h3 {

            margin-top: 25px;
        }
        
        .divisor {
            margin: 5px 0;
        }
        
        
    .resumo h3,
    .tituloEndereco,
    .valorBox .titulo {
        text-align: center;
    }
    

        }

        /* Mobile */
        @media (max-width:767px) {
            
            html, body {
    margin: 0;
    padding: 0;
    width: 100%;
}

.container {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
}

            .container {
                padding: 20px 20px;
                border-radius: 14px;
            }

            h3 {
                font-size: 16px;
                 margin-top: 25px;
            }

            label {
                font-size: 14px;
            }

            input,
            select {
                font-size: 14px;
                padding: 12px 35px 12px 12px;
            }

            .grid2 {
                gap: 4px;
            }

            .gridLine {
                gap: 4px;
            }

            button:not(.addParada) {
                font-size: 16px;
                padding: 14px;
            }

            .addParada {
                font-size: 14px;
            }

            /* resumo */
            .resumo {
                padding: 25px 15px;
            }

            .resumo h3 {
                font-size: 22px;
            }

            /* cards */
            .infoResumo {
                gap: 10px;
            }

            .infoBox {
                padding: 15px;
            }

            .valorBox {
                padding: 20px;
            }

            .valorBox .titulo {
                font-size: 20px;
            }

            .total {
                font-size: 15px;
            }
            
            hr {
        display: none;
    }
    
    .divisor {
            margin: 5px 0;
        }
        
        .resumo h3,
    .tituloEndereco,
    .valorBox .titulo {
        text-align: center;
    }
    
    .tituloEndereco {
            font-size: 18px;
        }

        }

        /* Mobile pequeno */
        @media (max-width:480px) {

            .container {
                padding: 20px 15px;
            }

            .resumo {
                padding: 20px 10px;
            }

            .valorBox {
                padding: 15px;
            }
            

        }
    </style>

</head>

<body>

<div class="container">


    <!-- Dados do solicitante -->

    <h3 class="tituloPrincipal">Dados do solicitante:</h3>

    <div class="grid2 semLinha">

        <div>
            <label>Nome</label>
            <input id="nome" placeholder="Digite seu nome">


            <label>Telefone</label>
            <input id="telefone" placeholder="Telefone (com DDD)">
        </div>

        <div>
            <label>Empresa</label>
            <input id="empresa" placeholder="Digite sua empresa">

            <label>E-mail</label>
            <input id="email" placeholder="Exemplo@email.com">
        </div>

    </div>
    
    <hr style="margin: 20px 0">


    <div class="grid2">

        <div>

            <!-- Informações do agendamento -->

            <h3>Informações do agendamento:</h3>

            <label>Qual veículo você precisa?</label>
            <select id="veiculo" required>
    <option value="" disabled selected>Selecione o veículo</option>
    <option value="Moto">Moto</option>
<option value="utilitario">Utilitário</option>
</select>

            <label>Data da coleta</label>
            <input type="date" id="dataColeta">

            <label>Data da entrega</label>
            <input type="date" id="dataEntrega">

        </div>

        <div>

            <!-- Informações da carga -->

            <h3>Informações da carga:</h3>

            <label>Tipo de carga</label>
          <select id="tipoCarga" required>
    <option value="" disabled selected>Selecione o tipo de carga</option>
    <option>Caixa</option>
    <option>Fardo</option>
    <option>Máquina</option>
    <option>Pneu</option>
    <option>Equipamento</option>
    <option>Diversos</option>
</select>

            <div class="gridLine">
                <div>
                    <label>Peso aproximado (kg)</label>
                    <input id="peso" type="number" min="0" oninput="this.value = Math.abs(this.value)"
                        placeholder="Digite o peso">
                </div>

                <div>
                    <label>Quantidade</label>
                    <input id="quantidade" type="number" min="0" oninput="this.value = Math.abs(this.value)"
                        placeholder="Digite a quantidade">
                </div>
            </div>

            <label>Dimensões</label>
            <input id="dimensoes" placeholder="Digite as dimensões da sua carga">

        </div>

    </div>
   
      <hr style="margin: 20px 0">

    <div class="grid2">

        <div>

            <!-- Informações da coleta -->

            <h3>Informações da coleta:</h3>

            <label>Localidade</label>
            <select id="localidadeColeta" required>
    <option value="" disabled selected>Selecione a localidade da coleta</option>
</select>
            

            <div class="gridLine">
                <div>
                    <label>Endereço</label>
                    <input id="enderecoColeta" placeholder="Digite o endereço">
                </div>

                <div>
                    <label>Complemento</label>
                    <input id="complementoColeta" placeholder="Digite o complemento">
                </div>
            </div>

            <div class="gridLine">
                <div>
                    <label>CEP</label>
                    <input id="cepColeta" placeholder="Digite o CEP">
                </div>

                <div>
                    <label>Estado</label>
                    <input id="estadoColeta" placeholder="Digite o estado">
                </div>
            </div>

            <label>Observações</label>
            <input id="obsColeta" placeholder="Digite sua observação">

            <div id="paradasColeta"></div>

            <button type="button" class="addParada" onclick="adicionarParada('coleta')">
                + Adicionar parada
            </button>

        </div>

        <div>

            <!-- Informações da entrega -->

            <h3>Informações da entrega:</h3>

            <label>Localidade</label>
            <select id="localidadeEntrega" required>
    <option value="" disabled selected>Selecione a localidade da entrega</option>
</select>

            <div class="gridLine">
                <div>
                    <label>Endereço</label>
                    <input id="enderecoEntrega" placeholder="Digite o endereço">
                </div>

                <div>
                    <label>Complemento</label>
                    <input id="complementoEntrega" placeholder="Digite o complemento">
                </div>
            </div>

            <div class="gridLine">
                <div>
                    <label>CEP</label>
                    <input id="cepEntrega" placeholder="Digite o CEP">
                </div>

                <div>
                    <label>Estado</label>
                    <input id="estadoEntrega" placeholder="Digite o estado">
                </div>
            </div>

            <label>Observações</label>
            <input id="obsEntrega" placeholder="Digite sua observação">

            <div id="paradasEntrega"></div>

            <button type="button" class="addParada" onclick="adicionarParada('entrega')">
                + Adicionar parada
            </button>

            <br><br>

            <label class="checkboxRetorno">
                <input type="checkbox" id="retorno">
                <span>Retornar ao local de origem</span>
            </label>

        </div>

    </div>

    <center>
        <button onclick="calcular()" style="margin-top:50px;">Fazer cotação</button>
    </center>

    <div class="resumo" id="resultado">

        <h3>Resumo da sua entrega econômica</h3>

        <div class="enderecos">

            <div class="enderecoBox">
                <p class="tituloEndereco">Endereço(s) de coleta</p>
                <p id="coleta"></p>
            </div>

            <div class="enderecoBox">
                <p class="tituloEndereco">Endereço(s) de entrega</p>
                <p id="entrega"></p>
            </div>

        </div>

        <div class="infoResumo">

            <div class="infoBox">
                <p>Veículo</p>
                <span id="resumoVeiculo"></span>
            </div>

            <div class="infoBox">
                <p>Coleta</p>
                <span id="resumoDataColeta"></span>
            </div>

            <div class="infoBox">
                <p>Entrega</p>
                <span id="resumoDataEntrega"></span>
            </div>

        </div>

        <div class="valorBox">

            <div class="titulo">Valor estimado</div>

            <div class="valorLinha">
                <span>Subtotal:</span>
                <span id="subtotal"></span>
            </div>

            <div class="valorLinha">
                <span>Desconto:</span>
                <span id="desconto" style="color:#02B302"></span>
            </div>

            <div class="divisor"></div>

            <div class="total">
                <span>Total Estimado:</span>
                <span id="total"></span>
            </div>

        </div>

        <center>
<button id="btnConfirmar" style="margin-top:40px; display:none;">
Agendar entrega econômica
</button>
</center>

        <div id="whatsBox"></div>

    </div>


</div>

<script>

    const tabela = {

        "Aclimação": 80, "Água Branca": 85, "Alphaville": 115, "Americanópolis": 98, "Anália Franco": 68, "Aricanduva": 68, "Arthur Alvim": 68, "Arujá": 65, "Guarulhos": 50,
        "Barra Funda": 75, "Barueri": 115, "Bela Vista": 80, "Belenzinho": 70, "Berrini": 105, "Brás": 70, "Brasilândia": 98, "Brooklin": 105, "Butantã": 105,
        "Cambuci": 85, "Campo Belo": 105, "Cangaíba": 68, "Cantareira": 68, "Capão Redondo": 150, "Carapicuíba": 118, "Carandiru": 70, "Carrão": 70, "Casa Verde": 78,
        "Ceasa": 95, "Centro-SP": 75, "Cidade Ademar": 120, "Cidade Patriarca": 70, "Cidade Tiradentes": 90, "Congonhas": 105, "Cidade Dutra": 160,
        "Diadema": 120, "Embu das Artes": 170, "Ermelino Matarazzo": 68,
        "Faria Lima": 105, "Ferraz de Vasconcelos": 98, "Freguesia do Ó": 85,
        "Grajaú": 180, "Guaianazes": 85, "Guarapiranga": 115,
        "Horto Florestal": 90, "Higienópolis": 88,
        "Ibirapuera": 105, "Imirim": 88, "Interlagos": 115, "Ipiranga": 95, "Itaim Paulista": 70, "Itapecerica da Serra": 195, "Itapevi": 180, "Itaquera": 70,
        "Jabaquara": 105, "Jaçanã": 70, "Jaguaré": 98, "Jandira": 180, "Jaraguá": 105, "Jardins": 105, "Jardim Ângela": 160, "Jardim Brasil": 70, "Jardim Japão": 70,
        "Jardim Paulista": 95, "Jardim São Luiz": 115, "Jurubatuba": 115,
        "Lapa": 90, "Largo do Socorro": 115, "Liberdade": 78, "Limão": 75, "Luz": 70,
        "Mandaqui": 80, "Mauá": 120, "Mogi das Cruzes": 160, "Mooca": 70, "Morumbi": 110,
        "Osasco": 110,
        "Pacaembu": 68, "Parada Inglesa": 68, "Parada de Taipas": 140, "Paraíso": 85, "Pari": 70, "Pedreira": 140, "Penha": 70, "Perdizes": 85, "Pinheiros": 105,
        "Piqueri": 90, "Planalto Paulista": 105, "Poá": 110, "Pompeia": 90, "Ponte Rasa": 70, "Parque São Domingos": 90, "Parque do Carmo": 75,
        "Parque Novo Mundo": 70, "Parque São Lucas": 98, "Praça da Sé": 75,
        "Ribeirão Pires": 170, "Rio Pequeno": 98,
        "Sacomã": 98, "Santa Cecília": 75, "Santana": 75, "Santo Amaro": 110, "Santo André": 120, "São Bernardo": 120, "São Caetano": 120,
        "São Mateus": 110, "São Miguel": 68, "Sapopemba": 75, "Saúde": 110, "Socorro": 110, "Sumaré": 98, "Suzano": 110,
        "Tatuapé": 70, "Tremembé": 85, "Tucuruvi": 70,

        "Vila Maria": 70, "Vila Mariana": 105, "Vila Matilde": 70, "Vila Medeiros": 70, "Vila Olímpia": 105, "Vila Santa Catarina": 115,
        "Vila Sônia": 120, "Vila Alexandria": 115,
        "Taboão da Serra": 150, "Cotia": 180

    };

document.addEventListener("DOMContentLoaded", function () {

    const selectColeta = document.getElementById("localidadeColeta");
    const selectEntrega = document.getElementById("localidadeEntrega");

    Object.keys(tabela).sort().forEach(localidade => {

        let option1 = document.createElement("option");
        option1.value = localidade;
        option1.textContent = localidade;

        let option2 = document.createElement("option");
        option2.value = localidade;
        option2.textContent = localidade;

        selectColeta.appendChild(option1);
        selectEntrega.appendChild(option2);
    });

    // opção "Outros"
    let outros1 = document.createElement("option");
    outros1.value = "Outros";
    outros1.textContent = "Outros";

    let outros2 = document.createElement("option");
    outros2.value = "Outros";
    outros2.textContent = "Outros";

    selectColeta.appendChild(outros1);
    selectEntrega.appendChild(outros2);

    document.getElementById("dataColeta").addEventListener("change", function() {
    document.getElementById("dataEntrega").min = this.value;
});

});

    let contadorParadas = {
        coleta: 0,
        entrega: 0
    };

    function adicionarParada(tipo) {

        let container = document.getElementById(
            tipo === "coleta" ? "paradasColeta" : "paradasEntrega"
        );
